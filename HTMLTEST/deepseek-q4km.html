<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        .calculator {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        #display {
            width: 200px;
            height: 40px;
            margin-bottom: 10px;
            font-size: 20px;
            text-align: right;
            padding: 5px;
            border: none;
            border-radius: 3px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }

        button {
            width: 100%;
            height: 40px;
            font-size: 18px;
            border: none;
            border-radius: 3px;
            background-color: #f0f0f0;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #e0e0e0;
        }

        .operator {
            background-color: #ff9500;
            color: white;
        }

        .equals {
            background-color: #2196F3;
            color: white;
        }

        .clear {
            background-color: #ff3b30;
            color: white;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" readonly>
        <div class="buttons">
            <button onclick="handleInput('(')">(</button>
            <button onclick="handleInput(')')">)</button>
            <button class="operator" onclick="handleInput('/')">/</button>
            <button class="operator" onclick="handleInput('*')">×</button>

            <button onclick="handleInput('7')">7</button>
            <button onclick="handleInput('8')">8</button>
            <button onclick="handleInput('9')">9</button>
            <button class="operator" onclick="handleInput('-')">-</button>

            <button onclick="handleInput('4')">4</button>
            <button onclick="handleInput('5')">5</button>
            <button onclick="handleInput('6')">6</button>
            <button class="operator" onclick="handleInput('+')">+</button>

            <button onclick="handleInput('1')">1</button>
            <button onclick="handleInput('2')">2</button>
            <button onclick="handleInput('3')">3</button>
            <button onclick="handleInput('.')">.</button>

            <button class="clear" onclick="handleInput('clear')">Clear</button>
            <button onclick="handleInput('0')">0</button>
            <button onclick="handleInput('.')">0.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let currentNumber = null;
        let numberStartIndex = 0;
        const operators = {
            '+': 'plus',
            '-': 'minus',
            '*': 'multiply',
            '/': 'divide'
        };

        function handleInput(value) {
            if (value === '(' || value === ')') {
                currentNumber += value;
            } else if (['+', '-', '*', '/'].includes(value)) {
                const currentValue = parseFloat(currentNumber);
                if (!currentValue) return;

                currentNumber = `${currentValue} ${value}`;
            } else if (value === 'clear' || value === '=') {
                currentNumber = '';
                numberStartIndex = null;
            } else if (value === '.' && currentNumber.includes('.')) {
                return;
            }

            currentNumber += value;

            // Handle when a new number starts after an operator or clear
            const startOfNewNumber = currentNumber.indexOf(' ', numberStartIndex);
            if (startOfNewNumber !== -1) {
                currentNumber = currentNumber.substring(startOfNewNumber + 1);
                numberStartIndex = null;
            } else {
                numberStartIndex = currentNumber.length;
            }

            updateDisplay();
        }

        function calculate() {
            if (!currentNumber || !numberStartIndex || currentNumber === '') return;

            const firstNumber = parseFloat(currentNumber.substring(0, numberStartIndex));
            const operator = currentNumber[numberStartIndex];
            const secondNumber = currentNumber.substring(numberStartIndex + 1);

            let result;
            switch (operator) {
                case '+':
                    result = firstNumber + parseFloat(secondNumber);
                    break;
                case '-':
                    result = firstNumber - parseFloat(secondNumber);
                    break;
                case '*':
                    result = firstNumber * parseFloat(secondNumber);
                    break;
                case '/':
                    if (secondNumber === '0') return; // Avoid division by zero
                    result = firstNumber / parseFloat(secondNumber);
            }

            currentNumber = `${result}`;
            numberStartIndex = null;
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('display').value = currentNumber;
        }

        // Handle keyboard input
        document.addEventListener('keydown', (e) => {
            if (/[0-9\.\+\-\*\/=]/.test(e.key)) {
                handleInput(e.key);
            } else if (e.key === 'Enter') {
                calculate();
            }
        });
    </script>
</body>
</html>
